<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR FIRST MONTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --netflix-dark-grey: #181818;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--netflix-black);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- Scene Logic --- */
        .scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        .scene.active { display: flex; animation: fadeIn 1s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Intro Animation --- */
        #intro-scene { background: black; z-index: 100; }
        .netflix-logo {
            color: var(--netflix-red);
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
            animation: netflixIntro 3.5s ease-in-out forwards;
        }
        @keyframes netflixIntro {
            0% { transform: scale(0.6); opacity: 0; filter: blur(10px); }
            40% { transform: scale(1); opacity: 1; filter: blur(0px); }
            80% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.4); opacity: 0; filter: blur(20px); }
        }

        /* --- Home Screen --- */
        #home-scene { background-size: cover; background-position: center; align-items: flex-start; padding-left: 6%; }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 10%, transparent 60%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }
        .hero-title { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 10px; }
        .hero-subtitle { font-size: 1.5rem; margin-bottom: 30px; font-weight: 300; color: #e5e5e5; }

        /* --- Buttons --- */
        .btn {
            cursor: pointer; border: none; border-radius: 4px; padding: 12px 30px;
            font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-primary { background: white; color: black; }
        .btn-secondary { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn:hover { transform: scale(1.05); filter: brightness(0.9); }

        /* --- Episode Grid --- */
        .episode-grid { display: grid; grid-template-columns: repeat(3, 280px); gap: 20px; padding: 20px; }
        .episode-card { background: var(--netflix-dark-grey); border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.4s ease; }
        .episode-card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .episode-card img { width: 100%; height: 140px; object-fit: cover; }
        .episode-card-body { padding: 12px; }
        .episode-card-body h4 { font-size: 0.9rem; }

        /* --- Portrait-Optimized Player --- */
        .player-container { width: 95%; max-width: 1200px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        /* Grid for 4 Portrait Images */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            height: 60vh;
            margin-top: 15px;
        }
        .grid-4 img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 6px; 
            cursor: zoom-in;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .grid-4 img:hover { transform: translateY(-5px); }

        /* Style for 1 Portrait Image */
        .single-img-wrapper {
            position: relative;
            margin-top: 15px;
            display: inline-block;
        }
        .single-img {
            max-height: 68vh; /* Optimized for iPhone portrait on a laptop screen */
            width: auto;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            cursor: zoom-in;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- Lightbox --- */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #lightbox img {
            max-height: 95vh;
            max-width: 95vw;
            object-fit: contain;
            animation: zoomEffect 0.3s ease;
        }
        @keyframes zoomEffect { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- Distance Visualization --- */
        .map-line { width: 70%; height: 2px; background: rgba(255,255,255,0.1); position: relative; margin: 60px auto; }
        .map-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--netflix-red); box-shadow: 0 0 20px var(--netflix-red); }
        .active .map-progress { animation: drawLine 4s 0.5s forwards ease-in-out; }
        .dot { position: absolute; width: 16px; height: 16px; background: var(--netflix-red); border-radius: 50%; top: -7px; }
        .city { position: absolute; top: 25px; font-size: 0.85rem; color: #aaa; white-space: nowrap; }
        @keyframes drawLine { to { width: 100%; } }

        /* --- Letter --- */
        .letter-container { max-width: 700px; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; border-top: 4px solid var(--netflix-red); line-height: 1.8; font-size: 1.1rem; }

        .back-btn { position: absolute; top: 40px; left: 40px; color: white; background: none; border: none; font-size: 1.5rem; cursor: pointer; z-index: 100; }
        .music-toggle { position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: rgba(0,0,0,0.5); border: 1px solid white; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cmtz.nyc3.cdn.digitaloceanspaces.com/UploadedFiles/Mixtapes/partynextdoor/PARTYNEXTDOOR%20-%20TBH.mp3" type="audio/mpeg">
    </audio>

    <button class="music-toggle" onclick="toggleMusic()"><i id="musicIcon" class="fas fa-volume-mute"></i></button>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <section id="intro-scene" class="scene active">
        <h1 class="netflix-logo">OUR FIRST MONTH</h1>
    </section>

    <section id="home-scene" class="scene">
        <div class="hero-overlay"></div>
        <div style="position: absolute; top: 30px; left: 6%; color: var(--netflix-red); font-size: 1.8rem; font-weight: 900;">OUR FIRST MONTH</div>
        <h1 class="hero-title" id="home-title"></h1>
        <p class="hero-subtitle" id="home-subtitle"></p>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-primary" onclick="goToEpisodes()"><i class="fas fa-play"></i> Play</button>
            <button class="btn btn-secondary" id="more-info-btn"><i class="fas fa-info-circle"></i> More Info</button>
        </div>
    </section>

    <section id="episode-scene" class="scene">
        <button class="back-btn" onclick="showScene('home-scene')"><i class="fas fa-arrow-left"></i></button>
        <h2 style="margin-bottom: 25px; font-size: 2rem;">Episodes | <span style="font-weight: 300; opacity: 0.6;">Season 1</span></h2>
        <div class="episode-grid" id="episode-list"></div>
    </section>

    <section id="player-scene" class="scene">
        <button class="back-btn" onclick="showScene('episode-scene')"><i class="fas fa-arrow-left"></i></button>
        <div id="standard-player" class="player-container">
            <h1 id="p-title" style="font-size: 2.2rem; margin-bottom: 5px;"></h1>
            <p id="p-desc" style="color: #bbb; max-width: 700px; font-size: 1.1rem;"></p>
            <div id="image-display-area" style="width:100%; display: flex; justify-content: center;"></div>
        </div>

        <div id="distance-player" style="display: none; text-align: center; width: 100%;">
            <h1>Miles between us: 1,446 Miles</h1>
            <div class="map-line">
                <div class="map-progress"></div>
                <div class="dot" style="left: 0;"><div class="city">13106 Green Shores Ln, Rosharon, TX</div></div>
                <div class="dot" style="right: 0;"><div class="city" style="right:0">3131 Normandy Woods Dr, Ellicott City, MD</div></div>
            </div>
            <p style="color: #aaa; max-width: 600px; margin: 0 auto; font-size: 1.2rem;" id="distance-text"></p>
        </div>
    </section>

    <section id="letter-scene" class="scene">
        <div class="letter-container">
            <h2 style="color: var(--netflix-red); margin-bottom: 20px;" id="letter-to"></h2>
            <div id="typewriter"></div>
            <p style="margin-top: 30px; text-align: right; font-weight: bold;" id="letter-from"></p>
            <button class="btn btn-secondary" style="margin-top: 30px; width: 100%; justify-content: center;" onclick="location.reload()">Replay Story</button>
        </div>
    </section>

    <script>
        const CONFIG = {
            homeTitle: "Aleena & Evin",
            homeSubtitle: "From Zoom Presentations to Relationship.",
            homeBackground: "https://i.ibb.co/rKLbXmD1/biscuit.jpg", 
            moreInfoAlert: "Season 1: The journey just started",
            letterTo: "To Aleena,",
            letterFrom: "- Evin ️",
            letterText: "Happy one-month anniversary, my love. I just wanted to say I love you so much. It's honestly crazy how slow/fast this month has gone by, and I wouldn't want to spend it with anybody else. Look how far we came. We started off staring at each other's foreheads in our MIS 4378 class and honestly, I thought you were the prettiest girl in class. I immediately wanted to get to know you but I just didn't know how to do it without coming off too strong. The few moments you showed your face in class, I would click on your camera and look at you here and there, because it was only a couple of times I got to see your face. The moment I found out you were graduating, I was like damn am I ever going to be able to shoot my shot? I always kept updated with whatever you were doing on LinkedIn and when I saw your LinkedIn post I knew I had to comment. I had to put myself in front of you to make sure you knew I was still here. One day I decided to get Hinge and explore the outside world for a little bit. I didn't know my entire world would be a girl I properly met on Hinge after crushing on her for a whole semester. I'm so glad I sent you a like because now I ended up liking you more and more every day after that. My love for you never stopped, and I genuinely wanted to get to know you as a person.  All of the nights that I've FaceTimed you, made me realize how much I like every part of you. Your personality, your humor, your constant love that you show me and everyone around you, your hobbies, your drive to be the best version of yourself. You are beautiful inside and out and I could not be any luckier. All of our dates, hangouts, our calls have proven to me that you are more than someone I just love. I'm in love with you. I feel at peace with you every time you are with me. You allow me to be the man that I want to be. You motivate me every single day. I don't take any of this for granted. I know it's been really hard being away from you for a month. It's like I just left as soon as we started this new journey but I hope you know that this will make us stronger and I am confident in us and what we have together. Anytime you need me, I'll be here. Let me be your rock. I can't wait to see you and finally give you the hug I've been waiting for. I can't wait to laugh with you and continue to grow what we have.  I know God has a great plan for us individually and together.  Aleena Prasad, I love you so much and happy one month my pretty girl.",

            episodes: [
                {
                    id: 1,
                    title: "The Zoom Class",
                    desc: "Where I had a little crush on you :)",
                    cardImg: "https://st1.zoom.us/static/6.3.54678/image/thumb.png", 
                    images: ["https://i.ibb.co/zhVLYFJV/zoom.jpg"] 
                },
                {
                    id: 2,
                    title: "The Hinge Match",
                    desc: "Everything worked out for a reason.",
                    cardImg: "https://1000logos.net/wp-content/uploads/2025/07/Hinge-logo.jpg",
                    images: ["https://i.ibb.co/vCkNh7bc/hinge.jpg"]
                },
                {
                    id: 3,
                    title: "Our First Date",
                    desc: "From FaceTime to Gyu-Kaku. I wish we could've gotten taken some pictures of our first date :(",
                    cardImg: "https://assets.arlingtonmagazine.com/2024/05/20181107_gyu_kaku_028.jpg",
                    images: ["https://i.ibb.co/LyMBZJ0/sad.jpg"]
                },
                {
                    id: 4,
                    title: "Replay Moments",
                    desc: "Some pictures I always come back to you because you're pretty.",
                    cardImg: "https://i.ibb.co/fYdwQh2J/capture2.jpg",
                    images: [
                        "https://i.ibb.co/mFXJH4MB/kiss.jpg",
                        "https://i.ibb.co/V0MZBFVS/capture.jpg",
                        "https://i.ibb.co/KpCZSSVv/capture4.jpg",
                        "https://i.ibb.co/Kp3nvssK/capture5.jpg"
                    ]
                },
                {
                    id: 5,
                    title: "The Distance",
                    isDistance: true,
                    desc: "How far I have to come to kiss you.",
                    cardImg: "https://images.ctfassets.net/ov8o7v78mnye/5rU7YRT6ouJCisVHgGaPJQ/bc2b945c6a29fa4b324691d40a6efc6a/blog-flight-tracker1-Adobe_Stock_Artur_Grom.jpg"
                },
                {
                    id: 6,
                    title: "One More Thing ❤️",
                    isFinale: true,
                    cardImg: "https://i.ibb.co/pv8vSsWm/fore.jpg"
                }
            ]
        };

        document.getElementById('home-scene').style.backgroundImage = `url('${CONFIG.homeBackground}')`;
        document.getElementById('home-title').innerText = CONFIG.homeTitle;
        document.getElementById('home-subtitle').innerText = CONFIG.homeSubtitle;
        document.getElementById('more-info-btn').onclick = () => alert(CONFIG.moreInfoAlert);
        document.getElementById('letter-to').innerText = CONFIG.letterTo;
        document.getElementById('letter-from').innerText = CONFIG.letterFrom;

        const episodeList = document.getElementById('episode-list');
        CONFIG.episodes.forEach(ep => {
            const card = document.createElement('div');
            card.className = 'episode-card';
            card.onclick = () => ep.isFinale ? startFinale() : playEpisode(ep);
            card.innerHTML = `<img src="${ep.cardImg}"><div class="episode-card-body"><h4>${ep.title}</h4></div>`;
            episodeList.appendChild(card);
        });

        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goToEpisodes() {
            try { document.getElementById('bgMusic').play(); } catch(e){}
            showScene('episode-scene');
        }

        function playEpisode(ep) {
            const standard = document.getElementById('standard-player');
            const distance = document.getElementById('distance-player');
            const displayArea = document.getElementById('image-display-area');
            displayArea.innerHTML = ""; 

            if (ep.isDistance) {
                standard.style.display = 'none';
                distance.style.display = 'block';
                document.getElementById('distance-text').innerText = ep.desc;
            } else {
                distance.style.display = 'none';
                standard.style.display = 'flex';
                document.getElementById('p-title').innerText = ep.title;
                document.getElementById('p-desc').innerText = ep.desc;

                if (ep.images.length === 1) {
                    const wrap = document.createElement('div');
                    wrap.className = 'single-img-wrapper';
                    const img = document.createElement('img');
                    img.src = ep.images[0];
                    img.className = 'single-img';
                    img.onclick = () => { document.getElementById('lightbox-img').src = img.src; document.getElementById('lightbox').style.display='flex'; };
                    wrap.appendChild(img);
                    displayArea.appendChild(wrap);
                } else {
                    const grid = document.createElement('div');
                    grid.className = 'grid-4';
                    ep.images.forEach(src => {
                        const img = document.createElement('img');
                        img.src = src;
                        img.onclick = () => { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display='flex'; };
                        grid.appendChild(img);
                    });
                    displayArea.appendChild(grid);
                }
            }
            showScene('player-scene');
        }

        function startFinale() {
            showScene('letter-scene');
            let i = 0;
            const target = document.getElementById('typewriter');
            target.innerHTML = "";
            function type() {
                if (i < CONFIG.letterText.length) {
                    target.innerHTML += CONFIG.letterText.charAt(i);
                    i++;
                    setTimeout(type, 35);
                }
            }
            type();
        }

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            const icon = document.getElementById('musicIcon');
            if (m.paused) { m.play(); icon.className = "fas fa-volume-up"; }
            else { m.pause(); icon.className = "fas fa-volume-mute"; }
        }

        window.onload = () => { setTimeout(() => { showScene('home-scene'); }, 3800); };
    </script>
</body>
</html>
